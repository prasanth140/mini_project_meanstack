<div class="test-container animate-fade-in">
  <header class="section-header">
    <div class="title-group">
      <h1>API Testing Console</h1>
      <p>Send manual requests and inspect real-time responses</p>
    </div>
  </header>

  <div class="test-layout">
    <div class="request-panel glass-morphism">
      <div class="panel-header">
        <h3>Request Configuration</h3>
      </div>
      
      <div class="config-form">
        <div class="url-input-group">
          <select [(ngModel)]="testRequest.method" class="method-select">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
          </select>
          <input type="text" [(ngModel)]="testRequest.url" class="url-input" placeholder="https://api.example.com/endpoint">
          <button class="btn-premium send-btn" (click)="sendRequest()" [disabled]="loading">
            {{ loading ? '...' : 'SEND' }}
          </button>
        </div>

        <div class="tabs">
          <button [class.active]="activeTab === 'headers'" (click)="activeTab = 'headers'">Headers</button>
          <button [class.active]="activeTab === 'body'" (click)="activeTab = 'body'">Body (JSON)</button>
        </div>

        <div class="tab-content">
          <div *ngIf="activeTab === 'headers'" class="headers-tab">
            <textarea [(ngModel)]="headersJson" class="json-editor" placeholder='{ "Content-Type": "application/json" }'></textarea>
          </div>
          <div *ngIf="activeTab === 'body'" class="body-tab">
            <textarea [(ngModel)]="bodyJson" class="json-editor" placeholder='{ "key": "value" }'></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="response-panel glass-morphism">
      <div class="panel-header">
        <h3>Response</h3>
        <div *ngIf="response" class="response-meta">
          <span class="status-badge" [class.success]="response.status < 400" [class.error]="response.status >= 400">
            {{ response.status }}
          </span>
          <span class="time-badge">{{ response.time }}ms</span>
        </div>
      </div>

      <div class="response-body">
        <div *ngIf="!response && !loading" class="empty-response">
          <i class="ri-radar-line"></i>
          <p>Configure and send a request to see the response here</p>
        </div>

        <div *ngIf="loading" class="loading-state">
          <div class="loader"></div>
          <p>Requesting...</p>
        </div>

        <div *ngIf="response" class="json-viewer animate-fade-in">
          <pre><code>{{ response.data | json }}</code></pre>
        </div>
      </div>
    </div>
  </div>
</div>
